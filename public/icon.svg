<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Deep Matte Dark Background -->
  <rect width="512" height="512" rx="112" fill="#09090B"/>
  
  <!-- Subtle Architectural Grid Background -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1E1E24" stroke-width="2" stroke-dasharray="6 6"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#1E1E24" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="256" y1="40" x2="256" y2="472" stroke="#1E1E24" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="40" y1="256" x2="472" y2="256" stroke="#1E1E24" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Logo Mark ("E" and "72" stylized as a continuous geometric path) -->
  <g transform="translate(136, 136)" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer Golden/Amber accent circle segments -->
    <path d="M 120 20 A 100 100 0 0 1 220 120" stroke="#F59E0B" stroke-width="12" />
    <path d="M 120 220 A 100 100 0 0 1 20 120" stroke="#3B82F6" stroke-width="12" />

    <!-- Stylized "E" structure inside -->
    <path d="M 60 70 L 140 70 M 60 120 L 125 120 M 60 170 L 140 170 M 60 70 L 60 170" stroke="#FFFFFF" stroke-width="18"/>
    
    <!-- Stylized "72" structure beside/intertwined -->
    <!-- "7" -->
    <path d="M 155 70 L 205 70 L 175 170" stroke="#E2E8F0" stroke-width="18"/>
    <!-- "2" -->
    <path d="M 155 130 C 155 115, 190 115, 190 135 C 190 155, 155 155, 155 170 L 200 170" stroke="#E2E8F0" stroke-width="18"/>
  </g>
</svg>
